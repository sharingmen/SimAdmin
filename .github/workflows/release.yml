name: Release Linux AMD64 (musl)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ========================
      # Node / Frontend
      # ========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      # ========================
      # Rust (MUSL STATIC BUILD)
      # ========================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build backend (musl)
        working-directory: backend
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: |
          cargo build --release --target x86_64-unknown-linux-musl

      # ========================
      # Verify (非常关键)
      # ========================
      - name: Verify binary
        run: |
          file backend/target/x86_64-unknown-linux-musl/release/simadmin || true
          ls -lh backend/target/x86_64-unknown-linux-musl/release/

      # ========================
      # Package
      # ========================
      - name: Package release
        run: |
          mkdir -p dist

          cp backend/target/x86_64-unknown-linux-musl/release/simadmin dist/
          cp -r frontend/dist dist/web

          chmod +x dist/simadmin

          VERSION=${GITHUB_REF_NAME}

          tar -czf SimAdmin-${VERSION}-linux-amd64.tar.gz -C dist .

          sha256sum SimAdmin-${VERSION}-linux-amd64.tar.gz > SHA256SUMS

      # ========================
      # Release
      # ========================
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SimAdmin-*.tar.gz
            SHA256SUMS
          generate_release_notes: true
